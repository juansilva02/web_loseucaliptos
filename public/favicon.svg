<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="7" fill="#171411"/>
  <!-- Cubo isométrico — colores de marca -->
  <!-- Cara superior: crema cálido -->
  <polygon points="16,5 27,10.5 16,16 5,10.5" fill="#f5d4a0"/>
  <!-- Cara izquierda: rojo acento -->
  <polygon points="5,10.5 16,16 16,27 5,21.5" fill="#db3a1e"/>
  <!-- Cara derecha: rojo oscuro (sombra) -->
  <polygon points="27,10.5 16,16 16,27 27,21.5" fill="#8c2510"/>
  <!-- Bordes sutiles para definición en tamaños pequeños -->
  <polyline points="16,5 27,10.5 16,16 5,10.5 16,5" fill="none" stroke="#171411" stroke-width="0.6"/>
  <line x1="16" y1="16" x2="16" y2="27" stroke="#171411" stroke-width="0.6"/>
</svg>
