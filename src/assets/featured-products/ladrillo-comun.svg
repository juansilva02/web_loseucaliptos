<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 220" width="400" height="220">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#843725"/>
      <stop offset="55%" style="stop-color:#bc6231"/>
      <stop offset="100%" style="stop-color:#ec9b62"/>
    </linearGradient>
    <linearGradient id="brickFaceA" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#c8531a"/>
      <stop offset="100%" style="stop-color:#8e2e0c"/>
    </linearGradient>
    <linearGradient id="brickFaceB" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#be4e18"/>
      <stop offset="100%" style="stop-color:#872b0b"/>
    </linearGradient>
    <linearGradient id="brickTop" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e07a40"/>
      <stop offset="100%" style="stop-color:#b84d18"/>
    </linearGradient>
    <linearGradient id="brickSide" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6a2208"/>
      <stop offset="100%" style="stop-color:#8e3410"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="rgba(20,8,2,0.5)"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="220" fill="url(#bgGrad)"/>
  <circle cx="30" cy="30" r="60" fill="rgba(255,255,255,0.03)"/>
  <circle cx="370" cy="190" r="80" fill="rgba(0,0,0,0.08)"/>

  <!-- Stack of 3 solid bricks in 3D isometric -->
  <g filter="url(#shadow)" transform="translate(55, 18)">

    <!-- === BRICK 3 (bottom) === -->
    <!-- top face -->
    <polygon points="30,128  160,128  178,112  48,112" fill="url(#brickTop)" stroke="#b84d18" stroke-width="0.5"/>
    <!-- front face -->
    <rect x="30" y="128" width="130" height="52" fill="url(#brickFaceB)" stroke="#8e2e0c" stroke-width="0.5"/>
    <!-- right side -->
    <polygon points="160,128  178,112  178,164  160,180" fill="url(#brickSide)" stroke="#6a2208" stroke-width="0.5"/>
    <!-- mortar lines on front -->
    <line x1="30" y1="154" x2="160" y2="154" stroke="rgba(40,10,0,0.3)" stroke-width="1"/>

    <!-- === BRICK 2 (middle, offset) === -->
    <!-- top face -->
    <polygon points="70,84  200,84  218,68  88,68" fill="url(#brickTop)" stroke="#b84d18" stroke-width="0.5"/>
    <!-- front face -->
    <rect x="70" y="84" width="130" height="52" fill="url(#brickFaceA)" stroke="#8e2e0c" stroke-width="0.5"/>
    <!-- right side -->
    <polygon points="200,84  218,68  218,120  200,136" fill="url(#brickSide)" stroke="#6a2208" stroke-width="0.5"/>
    <!-- mortar line -->
    <line x1="70" y1="110" x2="200" y2="110" stroke="rgba(40,10,0,0.3)" stroke-width="1"/>

    <!-- === BRICK 1 (top, offset again) === -->
    <!-- top face -->
    <polygon points="40,42  170,42  188,26  58,26" fill="url(#brickTop)" stroke="#b84d18" stroke-width="0.5"/>
    <!-- front face -->
    <rect x="40" y="42" width="130" height="52" fill="url(#brickFaceA)" stroke="#8e2e0c" stroke-width="0.5"/>
    <!-- right side -->
    <polygon points="170,42  188,26  188,78  170,94" fill="url(#brickSide)" stroke="#6a2208" stroke-width="0.5"/>
    <!-- mortar line -->
    <line x1="40" y1="68" x2="170" y2="68" stroke="rgba(40,10,0,0.3)" stroke-width="1"/>

    <!-- Texture grain on front faces -->
    <rect x="40" y="44" width="130" height="50" fill="url(#brickFaceA)" opacity="0" />
  </g>

  <!-- Label badge -->
  <rect x="20" y="170" width="160" height="34" rx="8" fill="rgba(20,8,2,0.55)"/>
  <text x="31" y="183" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="10" fill="#f07522" letter-spacing="1">LADRILLO COMÚN</text>
  <text x="31" y="197" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="13" fill="#ffffff" letter-spacing="0.5">SIN MARCA</text>

  <!-- Price badge -->
  <rect x="298" y="170" width="86" height="34" rx="8" fill="rgba(240,117,34,0.92)"/>
  <text x="341" y="183" font-family="Arial, sans-serif" font-weight="700" font-size="9" fill="#fff" text-anchor="middle" letter-spacing="0.5">UNIDAD</text>
  <text x="341" y="197" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="14" fill="#fff" text-anchor="middle">$ 220</text>
</svg>
