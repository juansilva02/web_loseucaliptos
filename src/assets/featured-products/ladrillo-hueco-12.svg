<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 220" width="400" height="220">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#843725"/>
      <stop offset="55%" style="stop-color:#bc6231"/>
      <stop offset="100%" style="stop-color:#ec9b62"/>
    </linearGradient>
    <linearGradient id="brickFace" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#d96b2a"/>
      <stop offset="100%" style="stop-color:#a33f14"/>
    </linearGradient>
    <linearGradient id="brickTop" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8824a"/>
      <stop offset="100%" style="stop-color:#c55a20"/>
    </linearGradient>
    <linearGradient id="brickSide" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7a2e10"/>
      <stop offset="100%" style="stop-color:#9e4018"/>
    </linearGradient>
    <linearGradient id="holeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3a1508"/>
      <stop offset="100%" style="stop-color:#5a2010"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="rgba(20,8,2,0.5)"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="220" fill="url(#bgGrad)"/>

  <!-- Subtle texture dots -->
  <circle cx="30" cy="30" r="60" fill="rgba(255,255,255,0.03)"/>
  <circle cx="370" cy="190" r="80" fill="rgba(0,0,0,0.08)"/>

  <!-- 3D Brick group — centered -->
  <g filter="url(#shadow)" transform="translate(70, 36)">

    <!-- TOP face of brick (isometric top) -->
    <polygon points="130,0  260,0  280,20  150,20" fill="url(#brickTop)" stroke="#c55a20" stroke-width="0.5"/>

    <!-- FRONT face of brick -->
    <rect x="130" y="20" width="130" height="88" fill="url(#brickFace)" stroke="#a33f14" stroke-width="0.5"/>

    <!-- RIGHT side face -->
    <polygon points="260,0  280,20  280,108  260,108" fill="url(#brickSide)" stroke="#7a2e10" stroke-width="0.5"/>

    <!-- Holes on front face — 4 columns × 2 rows of oval holes -->
    <!-- Row 1 -->
    <ellipse cx="148" cy="47" rx="9" ry="12" fill="url(#holeGrad)"/>
    <ellipse cx="175" cy="47" rx="9" ry="12" fill="url(#holeGrad)"/>
    <ellipse cx="202" cy="47" rx="9" ry="12" fill="url(#holeGrad)"/>
    <ellipse cx="229" cy="47" rx="9" ry="12" fill="url(#holeGrad)"/>
    <ellipse cx="248" cy="47" rx="7" ry="12" fill="url(#holeGrad)"/>

    <!-- Row 2 -->
    <ellipse cx="148" cy="81" rx="9" ry="12" fill="url(#holeGrad)"/>
    <ellipse cx="175" cy="81" rx="9" ry="12" fill="url(#holeGrad)"/>
    <ellipse cx="202" cy="81" rx="9" ry="12" fill="url(#holeGrad)"/>
    <ellipse cx="229" cy="81" rx="9" ry="12" fill="url(#holeGrad)"/>
    <ellipse cx="248" cy="81" rx="7" ry="12" fill="url(#holeGrad)"/>

    <!-- Mortar lines on front face -->
    <line x1="130" y1="64" x2="260" y2="64" stroke="rgba(80,25,5,0.4)" stroke-width="1"/>

    <!-- Top face hole projections (depth lines) -->
    <line x1="148" y1="20" x2="155" y2="8" stroke="rgba(80,25,5,0.35)" stroke-width="1"/>
    <line x1="166" y1="20" x2="173" y2="8" stroke="rgba(80,25,5,0.35)" stroke-width="1"/>
    <line x1="175" y1="20" x2="182" y2="8" stroke="rgba(80,25,5,0.35)" stroke-width="1"/>
    <line x1="193" y1="20" x2="200" y2="8" stroke="rgba(80,25,5,0.35)" stroke-width="1"/>
    <line x1="202" y1="20" x2="209" y2="8" stroke="rgba(80,25,5,0.35)" stroke-width="1"/>
    <line x1="220" y1="20" x2="227" y2="8" stroke="rgba(80,25,5,0.35)" stroke-width="1"/>
    <line x1="229" y1="20" x2="236" y2="8" stroke="rgba(80,25,5,0.35)" stroke-width="1"/>
    <line x1="247" y1="20" x2="254" y2="8" stroke="rgba(80,25,5,0.35)" stroke-width="1"/>

    <!-- Bottom line for ground shadow -->
    <line x1="130" y1="108" x2="260" y2="108" stroke="rgba(0,0,0,0.2)" stroke-width="2"/>
    <line x1="260" y1="108" x2="280" y2="108" stroke="rgba(0,0,0,0.2)" stroke-width="2"/>
  </g>

  <!-- Label badge -->
  <rect x="20" y="170" width="166" height="34" rx="8" fill="rgba(20,8,2,0.55)"/>
  <text x="31" y="183" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="10" fill="#f07522" letter-spacing="1">LADRILLO HUECO</text>
  <text x="31" y="197" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="13" fill="#ffffff" letter-spacing="0.5">DEL 12 — QUILMES</text>

  <!-- Dimension tag -->
  <rect x="296" y="170" width="88" height="34" rx="8" fill="rgba(240,117,34,0.92)"/>
  <text x="340" y="183" font-family="Arial, sans-serif" font-weight="700" font-size="9" fill="#fff" text-anchor="middle" letter-spacing="0.5">ESPESOR</text>
  <text x="340" y="197" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="15" fill="#fff" text-anchor="middle">12 cm</text>
</svg>
